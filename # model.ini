# model.py
import torch
import torch.nn as nn

class LeNet(nn.Module):
    """
    LeNet-5 网络结构
    输入: 1×28×28 (Fashion-MNIST图像)
    输出: 10个类别的概率
    """
    def __init__(self, num_classes=10):
        super(LeNet, self).__init__()
        
        # 特征提取部分
        self.features = nn.Sequential(
            # 第一层卷积: 输入1通道, 输出6通道, 卷积核5×5
            nn.Conv2d(in_channels=1, out_channels=6, kernel_size=5, padding=2),  # 输出: 6×28×28
            nn.ReLU(inplace=True),
            nn.MaxPool2d(kernel_size=2, stride=2),  # 输出: 6×14×14
            
            # 第二层卷积: 输入6通道, 输出16通道, 卷积核5×5
            nn.Conv2d(in_channels=6, out_channels=16, kernel_size=5),  # 输出: 16×10×10
            nn.ReLU(inplace=True),
            nn.MaxPool2d(kernel_size=2, stride=2),  # 输出: 16×5×5
        )
        
        # 分类器部分
        self.classifier = nn.Sequential(
            # 全连接层1: 输入16×5×5, 输出120
            nn.Linear(16 * 5 * 5, 120),
            nn.ReLU(inplace=True),
            nn.Dropout(p=0.5),
            
            # 全连接层2: 输入120, 输出84
            nn.Linear(120, 84),
            nn.ReLU(inplace=True),
            nn.Dropout(p=0.5),
            
            # 输出层: 输入84, 输出10个类别
            nn.Linear(84, num_classes),
        )
        
        # 初始化权重
        self._initialize_weights()
    
    def forward(self, x):
        # 特征提取
        x = self.features(x)
        
        # 展平特征图
        x = torch.flatten(x, 1)
        
        # 分类
        x = self.classifier(x)
        
        return x
    
    def _initialize_weights(self):
        """初始化网络权重"""
        for m in self.modules():
            if isinstance(m, nn.Conv2d):
                # 使用He初始化
                nn.init.kaiming_normal_(m.weight, mode='fan_out', nonlinearity='relu')
                if m.bias is not None:
                    nn.init.constant_(m.bias, 0)
            elif isinstance(m, nn.Linear):
                nn.init.normal_(m.weight, 0, 0.01)
                nn.init.constant_(m.bias, 0)

